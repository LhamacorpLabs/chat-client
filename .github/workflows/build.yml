name: Build

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build the application
        run: npm run build
        env:
          # Environment variables required for SvelteKit build
          PUBLIC_CHAT_API_URL: https://chat-be.lhamacorp.com
          PUBLIC_AUTH_API_URL: https://auth.lhamacorp.com
