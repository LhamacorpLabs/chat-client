name: Build

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build the application
        run: npm run build
        env:
          PUBLIC_CHAT_API_URL: https://chat-be.lhamacorp.com
          PUBLIC_AUTH_API_URL: https://auth.lhamacorp.com
          PUBLIC_MQTT_BROKER_URL: wss://mqtt.lhamacorp.com
          PUBLIC_REALTIME_MODE: mqtt
