name: Tauri Release

on:
  workflow_run:
    workflows: ["Build and Release"]
    types: [completed]
    branches: [main]

concurrency:
  group: tauri-release
  cancel-in-progress: true

jobs:
  version:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - id: version
        run: echo "version=$(date -u +%-y).$(date -u +%-m).${{ github.run_number }}" >> $GITHUB_OUTPUT

  cleanup:
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete existing release and tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --repo ${{ github.repository }} --yes 2>/dev/null || true
          gh api -X DELETE repos/${{ github.repository }}/git/refs/tags/latest 2>/dev/null || true

  tauri-release:
    needs: [version, cleanup]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        run: npm install

      - name: Set version
        run: node -e "const f=require('fs');const c=JSON.parse(f.readFileSync('src-tauri/tauri.conf.json','utf8'));c.version='${{ needs.version.outputs.version }}';f.writeFileSync('src-tauri/tauri.conf.json',JSON.stringify(c,null,2));"

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          PUBLIC_CHAT_API_URL: https://chat-be.lhamacorp.com
          PUBLIC_AUTH_API_URL: https://auth.lhamacorp.com
          PUBLIC_MQTT_BROKER_URL: wss://mqtt.lhamacorp.com
          PUBLIC_REALTIME_MODE: mqtt
        with:
          tagName: latest
          releaseName: "Chat (latest)"
          releaseBody: "Desktop client - always up to date"
          releaseDraft: false
          prerelease: false
          updaterJsonKeepUniversal: true
          args: ${{ matrix.args }}
