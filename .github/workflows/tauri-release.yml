name: Tauri Release

on:
  workflow_run:
    workflows: ["Build and Release"]
    types: [completed]
    branches: [main]

concurrency:
  group: tauri-release
  cancel-in-progress: true

jobs:
  tauri-release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        run: npm install

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          PUBLIC_CHAT_API_URL: https://chat-be.lhamacorp.com
          PUBLIC_AUTH_API_URL: https://auth.lhamacorp.com
          PUBLIC_MQTT_BROKER_URL: wss://mqtt.lhamacorp.com
          PUBLIC_REALTIME_MODE: mqtt
        with:
          tagName: v__VERSION__
          releaseName: "Chat v__VERSION__"
          releaseBody: "Desktop client update"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
