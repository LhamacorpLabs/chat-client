name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'main'
        type: string

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  version:
    name: Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      commit_message: ${{ steps.version.outputs.commit_message }}
    steps:
      - id: version
        run: |
          echo "version=$(date -u +%-y).$(date -u +%-m).$(( ${{ github.run_number }} ))" >> $GITHUB_OUTPUT
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "commit_message<<$EOF" >> $GITHUB_OUTPUT
          echo "${{ github.event.head_commit.message }}" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  build-and-release:
    name: Build & Release
    needs: [test, version]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build the application
        run: npm run build
        env:
          PUBLIC_CHAT_API_URL: https://chat-be.lhamacorp.com
          PUBLIC_AUTH_API_URL: https://auth.lhamacorp.com
          PUBLIC_AUTH_UI_URL: https://login.lhamacorp.com
          PUBLIC_MQTT_BROKER_URL: wss://mqtt.lhamacorp.com
          PUBLIC_REALTIME_MODE: mqtt

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push multi-platform Docker images
        run: |
          docker buildx create --use
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg PUBLIC_CHAT_API_URL=https://chat-be.lhamacorp.com \
            --build-arg PUBLIC_AUTH_API_URL=https://auth.lhamacorp.com \
            --build-arg PUBLIC_AUTH_UI_URL=https://login.lhamacorp.com \
            --build-arg PUBLIC_MQTT_BROKER_URL=wss://mqtt.lhamacorp.com \
            --build-arg PUBLIC_REALTIME_MODE=mqtt \
            --build-arg APP_VERSION=${{ needs.version.outputs.version }} \
            -t lhamacorp/chat-client:latest . --push

  deploy:
    name: Deploy
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Portainer Webhook
        run: curl --location --request POST '${{ secrets.DEPLOY_WEBHOOK }}'

  create-release:
    name: Create Release
    needs: [version, deploy]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create release (draft)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ needs.version.outputs.version }}" \
            --repo ${{ github.repository }} \
            --title "Chat v${{ needs.version.outputs.version }}" \
            --notes "${{ needs.version.outputs.commit_message }}" \
            --draft

  tauri-release:
    name: Tauri Release
    needs: [version, create-release]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        run: npm install

      - name: Set version
        run: node -e "const f=require('fs');const c=JSON.parse(f.readFileSync('src-tauri/tauri.conf.json','utf8'));c.version='${{ needs.version.outputs.version }}';f.writeFileSync('src-tauri/tauri.conf.json',JSON.stringify(c,null,2));"

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          PUBLIC_CHAT_API_URL: https://chat-be.lhamacorp.com
          PUBLIC_AUTH_API_URL: https://auth.lhamacorp.com
          PUBLIC_AUTH_UI_URL: https://login.lhamacorp.com
          PUBLIC_MQTT_BROKER_URL: wss://mqtt.lhamacorp.com
          PUBLIC_REALTIME_MODE: mqtt
          APP_VERSION: ${{ needs.version.outputs.version }}
        with:
          tagName: v${{ needs.version.outputs.version }}
          releaseName: "Chat v${{ needs.version.outputs.version }}"
          releaseBody: "${{ needs.version.outputs.commit_message }}"
          releaseDraft: true
          prerelease: false
          updaterJsonKeepUniversal: true
          args: ${{ matrix.args }}

  publish-release:
    name: Publish Release
    needs: [version, tauri-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "v${{ needs.version.outputs.version }}" \
            --repo ${{ github.repository }} \
            --draft=false \
            --latest

  cleanup:
    name: Cleanup
    needs: [version, publish-release]
    if: ${{ always() && needs.version.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete draft releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --repo ${{ github.repository }} --limit 100 --json tagName,isDraft --jq '.[] | select(.isDraft) | .tagName' | while read TAG; do
            gh release delete "$TAG" --repo ${{ github.repository }} --yes --cleanup-tag
          done

      - name: Delete old releases (keep last 3)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --repo ${{ github.repository }} --limit 100 --json tagName --jq '.[].tagName' | tail -n +4 | while read TAG; do
            gh release delete "$TAG" --repo ${{ github.repository }} --yes --cleanup-tag
          done
