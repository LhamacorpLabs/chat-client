name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'main'
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build the application
        run: npm run build
        env:
          PUBLIC_CHAT_API_URL: https://chat-be.lhamacorp.com
          PUBLIC_AUTH_API_URL: https://auth.lhamacorp.com
          PUBLIC_REALTIME_MODE: websocket

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Get git commit ID
        id: git-info
        run: echo "commit_id=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push multi-platform Docker images
        run: |
          docker buildx create --use
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg PUBLIC_CHAT_API_URL=https://chat-be.lhamacorp.com \
            --build-arg PUBLIC_AUTH_API_URL=https://auth.lhamacorp.com \
            --build-arg GIT_COMMIT_ID=${{ steps.git-info.outputs.commit_id }} \
            -t lhamacorp/chat-client:latest . --push

  deploy:
    name: Deploy
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Portainer Webhook
        run: curl --location --request POST '${{ secrets.DEPLOY_WEBHOOK }}'